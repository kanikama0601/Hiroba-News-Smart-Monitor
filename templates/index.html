<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hiroba News Smart Monitor v1.1</title>
    <link rel="stylesheet" href="/styles/index.css">

</head>

<body>

  <div id="bg"></div>
  <div id="bg-ov"></div>

  <div id="app">

    <div id="ticker-bar">
      <div class="ticker-label">LIVE NEWS</div>
      <div class="ticker-mask">
        <div id="ticker-inner"><span class="loader"
            style="padding:0 20px">表示されない場合、インターネット接続とJavascript、Pythonを確認してください</span></div>
      </div>
    </div>

    <div id="left-col">

      <div id="clock-block">
        <div id="time-display">
          <div style="display:flex;align-items:baseline;gap:4px;justify-content:center"><span id="th">--</span><span
              id="time-sep">:</span><span id="tm">--</span></div>
          <div id="ts" style="font-size:0.28em;opacity:0.40;letter-spacing:2px;margin-top:2px;text-align:right">--</div>
        </div>
        <div id="date-line">----年 -月 -日（-）</div>
        <div id="reiwa-line">令和--年 / 干支 --</div>
        <div id="city-line">📍 …</div>
      </div>

      <div id="weather-now">
        <div class="loader">表示されない場合、インターネット接続とJavascript、Pythonを確認してください</div>
      </div>

      <div id="hourly-block">
        <div class="weekly-label" style="padding:8px 12px 4px;margin:0;">今日の時間別</div>
        <div id="hourly-strip" class="drag-scroll"></div>
      </div>

      <div id="weekly-scroll" class="drag-scroll">
        <div class="weekly-label">週間予報</div>
        <div id="forecast-list"></div>
      </div>

    </div>

    <div id="right-col">

      <div id="disaster-bar">
        <div class="dis-icon">🚨</div>
        <div class="dis-content">
          <div class="dis-title">防災・緊急情報</div>
          <div class="dis-items" id="disaster-items"></div>
        </div>
      </div>

      <div id="forex-panel">
        <div class="forex-cards">
          <span class="forex-updated" id="forex-updated"></span>
        </div>
        <div class="forex-cards" id="forex-cards">
          <div class="loader" style="padding:8px;width:100%">表示されない場合、インターネット接続とJavascript、Pythonを確認してください</div>
        </div>
      </div>

      <div id="news-scroll" class="drag-scroll">
        <div class="loader">表示されない場合、インターネット接続とJavascript、Pythonを確認してください</div>
      </div>

    </div>

  </div>

  <script>
    'use strict';

    const DAY = ['日', '月', '火', '水', '木', '金', '土'];
    const ETOS = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    const JIKKAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const BACKEND_URL = {{ BACKEND_URL | tojson }};
    const IMAGE_API_URL = `${BACKEND_URL}/api/random-image`;
    const MONITOR_CONFIG = {{ MONITOR_CONFIG | tojson }};

    async function loadBackground() {
      const bgEl = document.getElementById('bg');
      const remoteUrl = IMAGE_API_URL;

      const img = new Image();
      img.onload = () => {
        bgEl.style.backgroundImage = `url('${img.src}')`;
      };
      img.onerror = () => {
        // 画像が取得できない場合は背景画像を消去し、CSSで定義された黒背景を表示
        bgEl.style.backgroundImage = 'none';
      };
      img.src = remoteUrl + (remoteUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
    }

    function reiwaYear(y) { return y - 2018; }

    function kanshi(y) {
      const jk = JIKKAN[(y - 4) % 10];
      const et = ETOS[(y - 4) % 12];
      return jk + et;
    }

    let lastH, lastM, lastS;
    function tick() {
      const n = new Date();
      const hh = String(n.getHours()).padStart(2, '0');
      const mm = String(n.getMinutes()).padStart(2, '0');
      const ss = String(n.getSeconds()).padStart(2, '0');

      if (hh !== lastH) {
        document.getElementById('th').textContent = hh;
        lastH = hh;
      }
      if (mm !== lastM) {
        document.getElementById('tm').textContent = mm;
        lastM = mm;
      }
      const firstRun = lastS === undefined;
      if (ss !== lastS) {
        document.getElementById('ts').textContent = ss;
        document.getElementById('time-sep').style.opacity = n.getSeconds() % 2 === 0 ? '1' : '0.15';
        lastS = ss;
      }

      if (ss === '00' || firstRun) {
        const y = n.getFullYear(), mo = n.getMonth() + 1, d = n.getDate();
        const dateStr = `${y}年 ${mo}月 ${d}日（${DAY[n.getDay()]}）`;
        const reiwaStr = `令和${reiwaYear(y)}年 / 干支 ${kanshi(y)}`;
        
        const de = document.getElementById('date-line');
        if (de.textContent !== dateStr) de.textContent = dateStr;
        const re = document.getElementById('reiwa-line');
        if (re.textContent !== reiwaStr) re.textContent = reiwaStr;
      }
    }
    setInterval(tick, 1000); tick();

    async function loadWeather() {
      try {
        const w = await (await fetch(`${BACKEND_URL}/api/weather`)).json();
        if (w.error) throw new Error(w.error);

        document.getElementById('city-line').textContent = '📍 ' + w.city;

        document.getElementById('weather-now').innerHTML = `
      <div class="wn-row">
        <div class="wn-icon">${w.icon}</div>
        <div>
          <div class="wn-temp">${w.temp}<span class="wn-unit">°C</span></div>
          <div class="wn-desc">${h(w.desc)}</div>
          <div class="wn-feels">体感 ${w.feels}°C</div>
        </div>
      </div>
      <div class="wn-stats">
        <div class="wn-stat">
          <div class="wn-stat-l">湿度</div>
          <div class="wn-stat-v">${w.humidity}<span class="wn-stat-u">%</span></div>
        </div>
        <div class="wn-stat">
          <div class="wn-stat-l">風速</div>
          <div class="wn-stat-v">${w.wind}<span class="wn-stat-u">km/h</span></div>
        </div>
        <div class="wn-stat">
          <div class="wn-stat-l">降水</div>
          <div class="wn-stat-v">${w.precip}<span class="wn-stat-u">mm</span></div>
        </div>
      </div>`;

        const curH = new Date().getHours();
        document.getElementById('hourly-strip').innerHTML =
          (w.hourly || []).map(x => {
            const hPart = parseInt(x.time.split(':')[0]);
            const isNow = curH >= hPart && curH < (hPart + 3);
            return `
        <div class="hc${isNow ? ' today' : ''}">
          <div class="hc-t">${x.time}</div>
          <div class="hc-i">${x.icon}</div>
          <div class="hc-tp">${x.temp}°</div>
        </div>`}).join('');

        const lbls = ['今日', '明日', '明後日'];
        document.getElementById('forecast-list').innerHTML =
          (w.forecast || []).map((f, i) => {
            const dt = new Date(f.date);
            const day = lbls[i] || `${dt.getMonth() + 1}/${dt.getDate()}`;
            const wd = DAY[dt.getDay()];
            return `<div class="fc-card${i === 0 ? ' today' : ''}">
          <div class="fc-day"><b>${day}</b>${i > 0 ? wd + '曜' : ''}</div>
          <div class="fc-ico">${f.icon}</div>
          <div class="fc-d">${h(f.desc)}</div>
          <div class="fc-tp">
            <div class="fc-hi">↑${f.max}°</div>
            <div class="fc-lo">↓${f.min}°</div>
            <div class="fc-pp">💧${f.precip}mm</div>
          </div>
        </div>`;
          }).join('');

      } catch (e) {
        document.getElementById('weather-now').innerHTML =
          `<div class="loader">天気取得失敗<br><small>${h(e.message)}</small></div>`;
      }
    }

    async function loadNews() {
      try {
        const feeds = await (await fetch(`${BACKEND_URL}/api/news`)).json();
        const all = feeds.flatMap(f => f.items || []);
        const tHtml = all.slice(0, 35).map(it =>
          `<span class="ti">▶ ${h(it.title)}</span>`
        ).join('<span class="ti-sep">●</span>');
        document.getElementById('ticker-inner').innerHTML = tHtml + '<span class="ti-sep">●</span>' + tHtml;
      } catch (e) {
        // ticker fallback
      }
    }

    function henkouBadgeClass(type) {
      if (type === '休講') return 'kyuko';
      if (type === '補講') return 'hoko';
      return 'henkou';
    }

    async function loadHenkou() {
      const ns = document.getElementById('news-scroll');
      try {
        const data = await (await fetch(`${BACKEND_URL}/api/henkou`)).json();
        if (data.error) throw new Error(data.error);

        // Filter outdated data (keep today or future)
        const todayStr = new Date(new Date().getTime() + 9 * 60 * 60 * 1000).toISOString().split('T')[0];
        const filteredData = data.filter(item => item['月日'] >= todayStr);

        // Group by date
        const groups = {};
        for (const item of filteredData) {
          const key = item['月日'];
          if (!groups[key]) groups[key] = [];
          groups[key].push(item);
        }

        const DAY_JA = ['日', '月', '火', '水', '木', '金', '土'];
        const sortedDates = Object.keys(groups).sort();

        const html = sortedDates.map(dateStr => {
          const items = groups[dateStr];
          // Format date label
          const dt = new Date(dateStr + 'T00:00:00+09:00');
          const mo = dt.getMonth() + 1;
          const dd = dt.getDate();
          const wd = items[0]['曜日'] || DAY_JA[dt.getDay()];
          const dateLabel = `${mo}月${dd}日（${wd}）`;

          const cards = items.map(it => {
            const type = it['変更内容'] || '';
            const badgeCls = henkouBadgeClass(type);
            const nensei = it['学年'] ? `${it['学年']}年` : '';
            const klass = it['学科・クラス'] ? `${it['学科・クラス']}` : '';
            const jigen = it['時限'] ? `第${it['時限']}限` : '';
            const subject = it['科目(担当教員)'] || '';
            return `<div class="nc">
              <span class="hk-badge ${badgeCls}">${h(type)}</span>
              <div class="hk-subject">${h(subject)}</div>
              <div class="hk-meta">${h(nensei)} ${h(klass)}　${h(jigen)}</div>
            </div>`;
          }).join('');

          return `<div class="feed-group">
            <div class="feed-name">${h(dateLabel)}</div>
            <div class="news-grid">${cards}</div>
          </div>`;
        }).join('');

        ns.innerHTML = html || '<div class="loader">変更情報なし</div>';
      } catch (e) {
        ns.innerHTML = `<div class="loader">変更情報取得失敗: ${h(e.message)}</div>`;
      }
    }

    async function loadDisaster() {
      try {
        const feeds = await (await fetch(`${BACKEND_URL}/api/disaster`)).json();
        const bar = document.getElementById('disaster-bar');
        const items = document.getElementById('disaster-items');
        const all = feeds.flatMap(f => f.items || []);

        // Filter by region (Kagawa/Okayama) AND title must contain 'H27' (full or half width)
        const filtered = all.filter(it =>
          (it.title.includes('香川県') || it.title.includes('岡山県') ||
            it.desc.includes('香川県') || it.desc.includes('岡山県')) &&
          (it.title.includes('H27') || it.title.includes('Ｈ２７'))
        );

        if (!filtered.length) {
          bar.classList.add('visible');
          bar.classList.add('safe');
          bar.querySelector('.dis-icon').textContent = '✅';
          items.innerHTML = '<span class="dis-ok">現在、香川県・岡山県に防災情報はありません</span>';
        } else {
          bar.classList.add('visible');
          bar.classList.remove('safe');
          bar.querySelector('.dis-icon').textContent = '🚨';
          items.innerHTML = filtered.slice(0, 8).map(it =>
            `<div class="dis-item">${h(it.desc || it.title)}</div>`
          ).join('');
        }
      } catch {
      }
    }

    function h(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const FX_PAIRS = [
      { base: 'usd', label: 'USD/JPY 米ドル/日本円' },
      { base: 'eur', label: 'EUR/JPY ユーロ/日本円' },
      { base: 'gbp', label: 'GBP/JPY 英ポンド/日本円' },
    ];
    const fxPeriod = '1w';
    let fxData = {};

    function isoDate(offsetDays = 0) {
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      return d.toISOString().slice(0, 10);
    }

    async function fetchRate(dateStr, base) {
      const urls = [
        `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${dateStr}/v1/currencies/${base}.min.json`,
        `https://${dateStr}.currency-api.pages.dev/v1/currencies/${base}.min.json`,
      ];
      for (const url of urls) {
        try {
          const r = await fetch(url);
          if (!r.ok) continue;
          const j = await r.json();
          return j[base]['jpy'];
        } catch { }
      }
      return null;
    }

    async function loadForex() {
      const yday = isoDate(-1);
      const lastWeek = isoDate(-7);
      try {
        const bases = FX_PAIRS.map(p => p.base);
        const [lt, yd, wk] = await Promise.all([
          Promise.all(bases.map(b => fetchRate('latest', b))),
          Promise.all(bases.map(b => fetchRate(yday, b))),
          Promise.all(bases.map(b => fetchRate(lastWeek, b))),
        ]);
        fxData = { latest: {}, prev1d: {}, prev1w: {} };
        bases.forEach((b, i) => {
          fxData.latest[b] = lt[i];
          fxData.prev1d[b] = yd[i];
          fxData.prev1w[b] = wk[i];
        });
        const now = new Date();
        document.getElementById('forex-updated').textContent =
          `最終更新 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        renderForex();
      } catch (e) {
        document.getElementById('forex-cards').innerHTML =
          `<div class="loader" style="padding:8px;width:100%">取得失敗: ${h(e.message)}</div>`;
      }
    }

    function renderForex() {
      if (!fxData.latest) return;
      const prev = fxData.prev1w;
      const label = '前週比';
      const html = FX_PAIRS.map(p => {
        const cur = fxData.latest[p.base];
        const old = prev[p.base];
        if (cur == null) return `
      <div class="fx-card">
        <div class="fx-pair">${p.label}</div>
        <div class="fx-rate">—</div>
      </div>`;
        const diff = (old != null) ? cur - old : null;
        const pct = (old != null && old !== 0) ? (diff / old * 100) : null;
        const sign = diff > 0 ? '+' : '';
        const cls = diff == null ? 'flat' : diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
        const arrow = diff == null ? '─' : diff > 0 ? '▲' : diff < 0 ? '▼' : '─';
        const changeHtml = diff != null
          ? `<div class="fx-change ${cls}">${arrow} ${sign}${diff.toFixed(2)} (${sign}${pct.toFixed(2)}%)</div>`
          : `<div class="fx-change flat">─</div>`;
        return `
      <div class="fx-card">
        <div class="fx-pair">${p.label}</div>
        <div class="fx-rate">${cur.toFixed(2)}<span>円</span></div>
        ${changeHtml}
        <div class="fx-label">${label}</div>
      </div>`;
      }).join('');
      document.getElementById('forex-cards').innerHTML = html;
    }

    // ── apply server-rendered config ──────────────────────────────
    const CFG = MONITOR_CONFIG || {};
    if (CFG.compactClock) document.body.classList.add('compact-clock');
    if (CFG.mouseHide) document.body.classList.add('mouse-hide');

    // ── wake lock ─────────────────────────────────────────────────
    if (CFG.wakeLock && 'wakeLock' in navigator) {
      let wakeLock = null;
      async function acquireWakeLock() {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch { }
      }
      // ページが再表示されたとき（タブ切替後など）に再取得
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') acquireWakeLock();
      });
      acquireWakeLock();
    }

    // ── drag / touch scroll ───────────────────────────────────────
    function enableDragScroll(el) {
      let startY = 0, startX = 0, scrollY = 0, scrollX = 0, dragging = false;

      function onDown(e) {
        dragging = true;
        startY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
        startX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
        scrollY = el.scrollTop;
        scrollX = el.scrollLeft;
        el.classList.add('dragging');
        if (e.type === 'mousedown') e.preventDefault();
      }
      function onMove(e) {
        if (!dragging) return;
        const cy = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
        const cx = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
        el.scrollTop = scrollY - (cy - startY);
        el.scrollLeft = scrollX - (cx - startX);
      }
      function onUp() { dragging = false; el.classList.remove('dragging'); }

      el.addEventListener('mousedown', onDown, { passive: false });
      el.addEventListener('mousemove', onMove, { passive: true });
      el.addEventListener('mouseup', onUp, { passive: true });
      el.addEventListener('mouseleave', onUp, { passive: true });
      el.addEventListener('touchstart', onDown, { passive: true });
      el.addEventListener('touchmove', onMove, { passive: true });
      el.addEventListener('touchend', onUp, { passive: true });
    }

    document.querySelectorAll('.drag-scroll').forEach(enableDragScroll);

    // ── auto scroll ───────────────────────────────────────────────
    function initAutoScroll(elId) {
      const el = document.getElementById(elId);
      if (!el) return;
      let pauseCount = 0;
      setInterval(() => {
        if (el.classList.contains('dragging')) return;
        if (el.scrollHeight <= el.clientHeight) return;

        if (pauseCount > 0) {
          pauseCount--;
          return;
        }

        el.scrollTop += 1;
        
        // Check if hit the bottom
        if (Math.ceil(el.scrollTop + el.clientHeight) >= el.scrollHeight) {
          el.scrollTop = 0;
          pauseCount = 60; // 3s pause at 50ms interval (50 * 60 = 3000ms)
        }
      }, 50);
    }
    initAutoScroll('news-scroll');

    document.addEventListener('click', function (e) {
      if (!CFG.compactNews) return;
      if (!e.target.closest('#news-scroll')) {
        document.querySelectorAll('.nc.expanded').forEach(c => c.classList.remove('expanded'));
      }
    });

    loadWeather();
    loadNews();
    loadHenkou();
    loadDisaster();
    loadForex();
    loadBackground();
    setInterval(loadWeather, 10 * 60 * 1000);
    setInterval(loadNews, 5 * 60 * 1000);
    setInterval(loadHenkou, 5 * 60 * 1000);
    setInterval(loadDisaster, 3 * 60 * 1000);
    setInterval(loadForex, 60 * 60 * 1000);
    setInterval(loadBackground, 15 * 60 * 1000);

    setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);
  </script>
</body>

</html>
